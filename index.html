<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Magazine Flipbook</title>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #111;
color: white;
text-align: center;
}

#loading {
padding: 20px;
}

#book {
margin: auto;
width: 90vw;
height: 90vh;
}

.page {
display: flex;
justify-content: center;
align-items: center;
background: white;
}

.page canvas {
width: 100%;
height: 100%;
}

.controls {
position: fixed;
bottom: 10px;
left: 50%;
transform: translateX(-50%);
display: flex;
gap: 10px;
}

button {
padding: 10px 15px;
cursor: pointer;
}
</style>
</head>

<body>

<div id="loading">Loading magazine...</div>

<div id="book"></div>

<div class="controls">
<button id="prev">Prev</button>
<button id="next">Next</button>
<button id="download">Download PDF</button>
</div>

<!-- PDF.js (MUST load first) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<!-- PageFlip -->
<script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>
const pdfURL = "./magazine.pdf";

function showError(msg) {
document.getElementById("loading").innerHTML =
"<h3>Magazine Error</h3><p>" + msg + "</p>";
console.error("MAGAZINE ERROR:", msg);
}

window.addEventListener("load", async () => {
try {

console.log("Loading magazine...");

/* LOAD PDF */
const pdf = await pdfjsLib.getDocument(pdfURL).promise;
console.log("PDF loaded:", pdf.numPages);

const pages = [];

/* RENDER PAGES */
for (let i = 1; i <= pdf.numPages; i++) {
const page = await pdf.getPage(i);
const viewport = page.getViewport({ scale: 2 });

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({
canvasContext: ctx,
viewport
}).promise;

const div = document.createElement("div");
div.className = "page";
div.appendChild(canvas);

pages.push(div);
}

/* CHECK PAGEFLIP */
const PageFlipClass = window.St?.PageFlip || window.PageFlip;

if (!PageFlipClass) {
throw new Error("PageFlip library failed to load");
}

/* INIT FLIPBOOK */
const flipbook = new PageFlipClass(document.getElementById("book"), {
width: 850,
height: 1100,
size: "stretch",
showCover: true,
mobileScrollSupport: true,
maxShadowOpacity: 0.5
});

flipbook.loadFromHTML(pages);

/* CONTROLS */
document.getElementById("prev").onclick = () => flipbook.flipPrev();
document.getElementById("next").onclick = () => flipbook.flipNext();
document.getElementById("download").onclick = () => window.open(pdfURL);

/* SUCCESS */
document.getElementById("loading").style.display = "none";

} catch (err) {
showError(err?.message || err);
}
});
</script>

</body>
</html>
