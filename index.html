<script>

const pdfURL = "./magazine.pdf";

/* SAFETY */
function showError(msg){
document.getElementById("loading").innerHTML =
"<h3>Magazine Error</h3><p>" + msg + "</p>";
console.error(msg);
}

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

let flipbook;

window.addEventListener("load", async () => {

try {

setTimeout(async () => {

console.log("Starting magazine...");

/* LOAD PDF */
const pdf = await pdfjsLib.getDocument(pdfURL).promise;

const pages = [];

for (let i = 1; i <= pdf.numPages; i++) {

const page = await pdf.getPage(i);
const viewport = page.getViewport({ scale: 2 });

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({
canvasContext: ctx,
viewport
}).promise;

const div = document.createElement("div");
div.className = "page";
div.appendChild(canvas);

pages.push(div);
}

/* FIND PAGEFLIP (FIXED COMPATIBILITY) */
const PageFlipClass = window.St?.PageFlip || window.PageFlip;

if (!PageFlipClass) {
showError("PageFlip failed to load (St/PageFlip missing)");
return;
}

flipbook = new PageFlipClass(document.getElementById("book"), {
width: 850,
height: 1100,
size: "stretch",
showCover: true,
mobileScrollSupport: true,
maxShadowOpacity: 0.5
});

flipbook.loadFromHTML(pages);

/* CONTROLS */
document.getElementById("prev").onclick =
() => flipbook.flipPrev();

document.getElementById("next").onclick =
() => flipbook.flipNext();

document.getElementById("download").onclick =
() => window.open(pdfURL);

/* SUCCESS */
document.getElementById("loading").style.display = "none";

}, 500);

} catch (err) {
showError(err.message);
}

});

</script>
