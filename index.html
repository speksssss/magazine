<script>

const pdfURL = "./magazine.pdf";

/* ERROR DISPLAY */
function showError(msg){
document.body.innerHTML =
"<div style='color:white;background:#111;padding:20px;font-family:Arial'>" +
"<h2>Magazine Error</h2><p>" + msg + "</p></div>";
console.error(msg);
}

/* CHECK LIBRARIES */
window.addEventListener("load", async () => {

try {

if (!window.pdfjsLib) {
showError("PDF.js failed to load");
return;
}

if (!window.St) {
showError("PageFlip library failed to load (St is undefined)");
return;
}

/* LOAD PDF */
const pdf = await pdfjsLib.getDocument(pdfURL).promise;

const pages = [];

for (let i = 1; i <= pdf.numPages; i++) {

const page = await pdf.getPage(i);
const viewport = page.getViewport({ scale: 2 });

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({
canvasContext: ctx,
viewport
}).promise;

const div = document.createElement("div");
div.className = "page";
div.appendChild(canvas);

pages.push(div);
}

/* INIT FLIPBOOK */
const flipbook = new St.PageFlip(document.getElementById("book"), {
width: 850,
height: 1100,
size: "stretch",
showCover: true
});

flipbook.loadFromHTML(pages);

/* BUTTONS */
document.getElementById("prev").onclick = () => flipbook.flipPrev();
document.getElementById("next").onclick = () => flipbook.flipNext();
document.getElementById("download").onclick = () => window.open(pdfURL);

document.getElementById("loading").style.display = "none";

} catch (err) {
showError(err.message);
}

});

</script>
